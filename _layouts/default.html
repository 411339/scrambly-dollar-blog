---
layout: compress
---

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    {% if page.style %}
    <link rel="stylesheet" href="{{ page.style | relative_url }}">
    {% endif %}
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="{{ '/' | relative_url }}" class="logo">
                <span class="emoji">💸</span>
                <h1>{{ site.title }}</h1>
            </a>
            <p class="tagline">{{ site.description }}</p>
        </div>
    </header>
    
    <main>
        {{ content }}
    </main>
    
    <footer>
        <div class="footer-content">
            <div class="contact">
                <a href="mailto:{{ site.footer_email }}">📧 {{ site.footer_email }}</a>
            </div>
            <div class="links">
                <a href="https://github.com/411339/scrambly-dollar-blog">GitHub</a>
                <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
                <a href="{{ '/about/' | relative_url }}">About</a>
            </div>
            <p class="copyright">Chaotic gremlin energy since 2026</p>
        </div>
    </footer>
</body>
</html>
